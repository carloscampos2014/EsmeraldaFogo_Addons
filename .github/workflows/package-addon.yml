name: Build and Release MCADDON

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get install -y zip
      
      - name: Create MCADDON package
        run: |
          cd EsmeraldaFogo
          zip -r -q ../EsmeraldaFogo.mcaddon EsmeraldaFogo_BP EsmeraldaFogo_RP
          ls -lh ../EsmeraldaFogo.mcaddon
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: EsmeraldaFogo.mcaddon
          body: |
            # 🔥 Esmeralda de Fogo - Versão ${{ github.ref_name }}
            
            ## 📥 Instalação Rápida
            
            **Windows/Console:**
            - Baixe o arquivo `.mcaddon`
            - Clique duas vezes
            - Minecraft importa automaticamente
            
            **Mobile:**
            - Mova para pasta de Addons
            - Abra Minecraft e ative
            
            Aproveite o addon!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
